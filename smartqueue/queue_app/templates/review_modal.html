<!-- Review Submission Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1" role="dialog" aria-labelledby="reviewModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reviewModalLabel">Submit Review</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="reviewForm" method="POST" action="{% url 'submit_review' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <!-- Hidden fields -->
                    <input type="hidden" id="reviewStudentId" name="student_id" value="{{ student_id }}">
                    <input type="hidden" id="reviewSector" name="sector" value="">
                    <input type="hidden" id="reviewToken" name="token_number" value="">

                    <!-- Rating Section -->
                    <div class="form-group">
                        <label for="rating">Rate Your Experience:</label>
                        <div class="rating-stars">
                            <input type="radio" name="rating" id="star5" value="5" required>
                            <label for="star5" class="star">★</label>
                            
                            <input type="radio" name="rating" id="star4" value="4">
                            <label for="star4" class="star">★</label>
                            
                            <input type="radio" name="rating" id="star3" value="3">
                            <label for="star3" class="star">★</label>
                            
                            <input type="radio" name="rating" id="star2" value="2">
                            <label for="star2" class="star">★</label>
                            
                            <input type="radio" name="rating" id="star1" value="1">
                            <label for="star1" class="star">★</label>
                        </div>
                    </div>

                    <!-- Comment Section -->
                    <div class="form-group">
                        <label for="comment">Additional Comments (Optional):</label>
                        <textarea class="form-control" id="comment" name="comment" rows="4" placeholder="Share your feedback..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .rating-stars {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 10px;
    }

    .rating-stars input {
        display: none;
    }

    .rating-stars .star {
        font-size: 30px;
        color: #ddd;
        cursor: pointer;
        transition: color 0.2s;
    }

    .rating-stars input:checked ~ .star,
    .rating-stars .star:hover,
    .rating-stars .star:hover ~ .star {
        color: #ffc107;
    }
</style>

<script>
    document.getElementById('reviewForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        fetch('{% url "submit_review" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                $('#reviewModal').modal('hide');
                document.getElementById('reviewForm').reset();
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
    });
</script>

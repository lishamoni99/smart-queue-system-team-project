<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #1a1a2e; color: white; padding-top: 50px; }
        form { display: inline-block; background: #16213e; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: none; }
        button { background-color: #0f3460; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Submit Your Feedback</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="student_name" placeholder="Enter Your Name" required>
        <input type="number" name="rating" placeholder="Rating (1-5)" min="1" max="5" required>
        <textarea name="comment" placeholder="Write your feedback here..." rows="4" required></textarea>
        <label>Upload Photo:</label>
        <input type="file" name="image" accept="image/*" capture="none">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
